# GitHub Actions Workflow for Heimdall Monitor
# Deploy to Dokploy managed VPS using GitHub Container Registry

name: Deploy Heimdall Monitor to Dokploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: internet-monitor-dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published successfully
        run: |
          echo "✅ Container image published to GitHub Container Registry"
          echo "📦 Image: ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "🔄 Dokploy will automatically pull and deploy this updated image"
